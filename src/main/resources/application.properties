server.port=8080

# ── Email (SMTP) ──────────────────────────────────────────────────────────────
# Configura con tus credenciales reales (o variables de entorno en producción)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM}

# URL base del frontend (usada en el link de activación)
vitalink.app.url=${APP_URL}

# Permite patrones regex en @GetMapping (necesario para SpaController)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Rate limiting
ratelimit.max-hits=3
ratelimit.time-hit=2
ratelimit.block-minutes=4

# Perfil activo por defecto
spring.profiles.active=dev

# Serializar Instant como ISO-8601 ("2026-03-06T20:14:00Z")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# JWT
jwt.secret-key=${JWT_SECRET_KEY}
jwt.expiration-ms=86400000

# Cloudflare Turnstile
cloudflare.turnstile.secret-key=${TURNSTILE_SECRET_KEY}
cloudflare.turnstile.verify-url=https://challenges.cloudflare.com/turnstile/v0/siteverify

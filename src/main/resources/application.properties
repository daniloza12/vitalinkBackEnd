server.port=8080

# Permite patrones regex en @GetMapping (necesario para SpaController)
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Rate limiting
ratelimit.max-hits=3
ratelimit.time-hit=2
ratelimit.block-minutes=4

# Perfil activo por defecto
spring.profiles.active=dev

# Serializar Instant como ISO-8601 ("2026-03-06T20:14:00Z")
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

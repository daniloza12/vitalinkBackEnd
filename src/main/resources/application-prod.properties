# =============================================================
# Perfil PROD — AWS RDS PostgreSQL
# Activar con: SPRING_PROFILES_ACTIVE=prod
# =============================================================

server.port=8080

# ─── RDS PostgreSQL PROD ───────────────────────────────────
spring.datasource.url=jdbc:postgresql://vitalink-db-dev.cvsa260o02xg.us-east-2.rds.amazonaws.com:5432/${DB_NAME:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:vitalink_admin}
spring.datasource.password=${DB_PASSWORD:VitaLink2024!}

# Connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ─── JPA ───────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── H2 Console deshabilitado en prod ──────────────────────
spring.h2.console.enabled=false

# ─── Jackson ───────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
